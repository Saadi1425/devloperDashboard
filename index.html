<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Developer OS Dashboard</title>

  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <div id="navbar">
    <div id="dev"><i class="fas fa-laptop-code"></i> Developer Dashboard</div>
    <button id="toggle"><i class="fas fa-moon"></i> Dark</button>
  </div>

  <!-- Widgets Row -->
  <div id="widgets">

    <!-- Clock -->
    <div class="widget" id="clock">
      <h3><i class="fas fa-clock"></i> Current Time</h3>
      <div id="time">00:00:00</div>
    </div>

    <!-- Weather -->
    <div class="widget" id="weather">
      <h3><i class="fas fa-sun"></i> Weather</h3>
      <div id="weatherInfo">Loading...</div>
    </div>

    <!-- Coding Quote -->
    <div class="widget" id="coding">
      <h3><i class="fas fa-lightbulb"></i> Quote</h3>
      <div id="quote">"Code is like humor..."</div>
      <button id="newQuoteBtn">Change Quote</button>
    </div>

    <!-- Task Manager -->
    <div class="widget" id="task">
      <h3><i class="fas fa-tasks"></i> Tasks</h3>
      <input type="text" id="taskInput" placeholder="Add new task...">
      <button id="addTask">Add</button>
      <ul id="taskList"></ul>
    </div>

    <!-- GitHub Stats -->
    <div class="widget" id="github">
      <h3><i class="fab fa-github"></i> GitHub</h3>
      <div id="githubStats">Loading...</div>
    </div>

    <!-- Quick Links -->
    <div class="widget" id="links">
      <h3><i class="fas fa-link"></i> Quick Links</h3>
      <ul>
        <li><a href="https://www.linkedin.com/in/saad-salman-376403324/" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a></li>
        <li><a href="https://github.com/Saadi1425/" target="_blank"><i class="fab fa-github"></i> GitHub</a></li>
        <li><a href="https://saadi1425.github.io/Personal-Portfolio/" target="_blank"><i class="fas fa-globe"></i> Portfolio</a></li>
      </ul>
      <button id="contactBtn"><i class="fas fa-envelope"></i> Contact Me</button>
    </div>

  </div>

  <!-- Footer -->
  <footer>
    &copy; Saad Salman. All rights reserved.
  </footer>

  <!-- Custom JS -->
  <script src="script.js"></script>
</body>
</html>
